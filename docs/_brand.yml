meta:
  name:
    full: Gribouille
    short: Gribouille
  link:
    home: https://m.canouil.dev/gribouille/

logo:
  small:
    light: assets/images/favicon.svg
    dark: assets/images/favicon-dark.svg
  medium:
    light: assets/images/logo.svg
    dark: assets/images/logo-dark.svg
  large:
    light: assets/images/logo-stacked.svg
    dark: assets/images/logo-stacked-dark.svg

color:
  palette:
    paper-light: "#FFFAF0"
    paper-dark: "#161B1E"
    ink-light: "#1A1A1A"
    ink-dark: "#F4EDDF"
    muted-light: "#5C5A52"
    muted-dark: "#A9A79E"
    surface-light: "#FFFDF7"
    surface-dark: "#1F272B"
    crayon-red: "#E94C3D"
    crayon-red-dk: "#FF6F60"
    crayon-teal: "#1F7A8C"
    crayon-teal-dk: "#5BB5C7"
    crayon-mustard: "#F4B740"
    crayon-must-dk: "#FFD166"
    crayon-mint: "#7FC8A9"
    crayon-mint-dk: "#9CDCC0"
  foreground:
    light: ink-light
    dark: ink-dark
  background:
    light: paper-light
    dark: paper-dark
  primary:
    light: crayon-red
    dark: crayon-red-dk
  secondary:
    light: crayon-teal
    dark: crayon-teal-dk
  tertiary:
    light: crayon-mustard
    dark: crayon-must-dk
  success:
    light: crayon-mint
    dark: crayon-mint-dk
  info:
    light: crayon-teal
    dark: crayon-teal-dk
  warning:
    light: crayon-mustard
    dark: crayon-must-dk
  danger: "#B23A2B"
  light: paper-light
  dark: ink-light

typography:
  fonts:
    - source: file
      family: Fraunces
      files:
        - path: assets/fonts/fraunces-wght-normal.woff2
          style: normal
          weight: 400
        - path: assets/fonts/fraunces-wght-normal.woff2
          style: normal
          weight: 500
        - path: assets/fonts/fraunces-wght-normal.woff2
          style: normal
          weight: 600
        - path: assets/fonts/fraunces-wght-normal.woff2
          style: normal
          weight: 700
        - path: assets/fonts/fraunces-wght-italic.woff2
          style: italic
          weight: 400
        - path: assets/fonts/fraunces-wght-italic.woff2
          style: italic
          weight: 500
        - path: assets/fonts/fraunces-wght-italic.woff2
          style: italic
          weight: 600
        - path: assets/fonts/fraunces-wght-italic.woff2
          style: italic
          weight: 700
    - source: file
      family: Inter
      files:
        - path: assets/fonts/inter-wght-normal.woff2
          style: normal
          weight: 400
        - path: assets/fonts/inter-wght-normal.woff2
          style: normal
          weight: 500
        - path: assets/fonts/inter-wght-normal.woff2
          style: normal
          weight: 600
        - path: assets/fonts/inter-wght-normal.woff2
          style: normal
          weight: 700
        - path: assets/fonts/inter-wght-italic.woff2
          style: italic
          weight: 400
        - path: assets/fonts/inter-wght-italic.woff2
          style: italic
          weight: 500
        - path: assets/fonts/inter-wght-italic.woff2
          style: italic
          weight: 600
        - path: assets/fonts/inter-wght-italic.woff2
          style: italic
          weight: 700
    - source: file
      family: JetBrains Mono
      files:
        - path: assets/fonts/jetbrains-mono-wght-normal.woff2
          style: normal
          weight: 400
        - path: assets/fonts/jetbrains-mono-wght-normal.woff2
          style: normal
          weight: 500
        - path: assets/fonts/jetbrains-mono-wght-normal.woff2
          style: normal
          weight: 700
        - path: assets/fonts/jetbrains-mono-wght-italic.woff2
          style: italic
          weight: 400
        - path: assets/fonts/jetbrains-mono-wght-italic.woff2
          style: italic
          weight: 700
  base:
    family: Inter
    size: 1rem
    line-height: 1.6
    weight: 400
  headings:
    family: Fraunces
    weight: 600
    line-height: 1.2
  monospace:
    family: JetBrains Mono
    size: 0.9em
  link:
    decoration: underline
    color: primary
    weight: 500
