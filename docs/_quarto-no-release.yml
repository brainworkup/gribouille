# Used before the first stable release; rendered at root with VERSION=dev.
project:
  render:
    - "*.qmd"
    - "**/*.qmd"
    - "!feature-matrix.qmd"

website:
  announcement:
    icon: exclamation-circle
    dismissable: false
    content: "**Development** - No stable release of *Gribouille* has been published
      yet. This documentation is built from the `main` branch and will change
      without notice."
    type: warning
    position: above-navbar
  navbar:
    left:
      - text: "Dev install"
        href: install-dev.qmd
