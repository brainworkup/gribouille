# Examples gallery data, consumed by the listing in `index.qmd` and by
# `assets/lua/examples-data.lua` (which injects the modal source blocks).
# One entry per `.typ` file in `examples/` (project root).
# `description` is inline HTML; the gallery EJS template emits it unescaped.

- slug: minimal
  section: basics
  title: "Minimal scatter"
  description: 'Inline iris sample plotted with a single <a href="../reference/geoms/geom-point.qmd"><code>geom-point</code></a> layer and continuous x/y scales.'
  alt: "Scatter plot of iris sepal width against sepal length with points coloured by species across setosa, versicolor, and virginica."

- slug: multilayer
  section: basics
  title: "Multilayer trend"
  description: 'Lines and points share a discrete colour mapping. <a href="../reference/geoms/geom-line.qmd"><code>geom-line</code></a> + <a href="../reference/geoms/geom-point.qmd"><code>geom-point</code></a>.'
  alt: "Line and point chart of monthly sales from month 1 to 6 for three regions (north, south, and east), all trending upwards."

- slug: labs-title
  section: basics
  title: "Titles and labels"
  description: 'Title, subtitle, caption, and axis labels set in a single <a href="../reference/labs/labs.qmd"><code>labs</code></a> call.'
  alt: "Scatter and line chart of count against month showing a rising trend, framed by a title, subtitle, caption, and axis labels."

- slug: factor-inline
  section: basics
  title: "Inline factor coercion"
  description: '<a href="../reference/core/as-factor.qmd"><code>as-factor</code></a> forces a numeric column to be treated as discrete for the colour aesthetic.'
  alt: "Scatter plot of a noisy sinusoidal pattern with points coloured by a three-level cluster factor coerced from a numeric column."

- slug: penguins
  section: basics
  title: "Penguins"
  description: "CSV-loaded dataset: flipper length versus body mass, coloured by species."
  alt: "Scatter plot of penguin body mass against flipper length, with points coloured by species revealing three separated clusters."

- slug: showcase
  section: basics
  title: "Showcase"
  description: 'Faceted penguins with a per-island linear smoother — the same plot used as the documentation site hero.'
  alt: "Three side-by-side facet panels (one per island) of penguin flipper length against body mass, each with points coloured by species and a per-species linear smoother."

- slug: dataset-mpg
  section: basics
  title: "Bundled mpg dataset"
  description: 'Highway mpg against engine displacement, filled by class — a quick look at the bundled <a href="../reference/datasets/mpg.qmd"><code>mpg</code></a> dataset.'
  alt: "Scatter plot of highway mpg against engine displacement, with points filled by vehicle class, showing highway mpg falling as displacement rises."

- slug: aes-promote
  section: basics
  title: "Continuous alpha and linewidth"
  description: 'Promoted aesthetics: <code>alpha</code> and <code>linewidth</code> map directly to numeric columns through <a href="../reference/scales/scale-alpha-continuous.qmd"><code>scale-alpha-continuous</code></a> and <a href="../reference/scales/scale-linewidth-continuous.qmd"><code>scale-linewidth-continuous</code></a>.'
  alt: "Two stacked panels: a scatter where point opacity scales with a numeric score, and a line chart where stroke thickness scales with a numeric weight per group."

- slug: bar-simple
  section: bars
  title: "Simple bars"
  description: 'Discrete x counted with <a href="../reference/geoms/geom-bar.qmd"><code>geom-bar</code></a>.'
  alt: "Bar chart of counts per fruit for four categories (apple, banana, cherry, and date), with banana tallest and cherry shortest."

- slug: bar-count
  section: bars
  title: "Category counts"
  description: '<a href="../reference/geoms/geom-bar.qmd"><code>geom-bar</code></a> backed by <a href="../reference/stats/stat-count.qmd"><code>stat-count</code></a> to tally observations per category.'
  alt: "Bar chart counting observations per category from A to D, with D the tallest and B the shortest."

- slug: bar-stacked
  section: bars
  title: "Stacked bars"
  description: '<a href="../reference/geoms/geom-col.qmd"><code>geom-col</code></a> with <a href="../reference/positions/position-stack.qmd"><code>position-stack</code></a> for cumulative totals per group.'
  alt: "Stacked bar chart of revenue per quarter (Q1 to Q3), with each bar split into contributions from products A, B, and C."

- slug: bar-dodged
  section: bars
  title: "Dodged bars"
  description: 'Side-by-side bars per group via <a href="../reference/positions/position-dodge.qmd"><code>position-dodge</code></a> on <a href="../reference/geoms/geom-col.qmd"><code>geom-col</code></a>.'
  alt: "Grouped bar chart of revenue per quarter (Q1 to Q3) with products A, B, and C shown as side-by-side bars within each quarter."

- slug: bar-filled
  section: bars
  title: "Filled bars"
  description: 'Each column normalised to 1 with <a href="../reference/positions/position-fill.qmd"><code>position-fill</code></a> to compare shares.'
  alt: "Proportional bar chart where each quarter's total is normalised to 1, showing the share of revenue from products A, B, and C."

- slug: histogram
  section: stats
  title: "Histogram"
  description: 'Continuous x binned with <a href="../reference/stats/stat-bin.qmd"><code>stat-bin</code></a> via <a href="../reference/geoms/geom-histogram.qmd"><code>geom-histogram</code></a>.'
  alt: "Histogram of highway fuel economy across 12 equal-width bins, with most vehicles concentrated between roughly 25 and 30 mpg."

- slug: smooth
  section: stats
  title: "Smoother"
  description: 'Scatter plus a linear fit with a 95% confidence ribbon from <a href="../reference/geoms/geom-smooth.qmd"><code>geom-smooth</code></a>.'
  alt: "Scatter of highway mpg against engine displacement overlaid with a linear smoother and its 95% confidence ribbon, showing a clear negative trend as displacement grows."

- slug: ribbon-bounds
  section: stats
  title: "Ribbon bounds"
  description: 'Explicit <code>ymin</code> / <code>ymax</code> aesthetics drive <a href="../reference/geoms/geom-ribbon.qmd"><code>geom-ribbon</code></a> around a fitted line.'
  alt: "Line and point chart of an upward trend over 20 time steps with a shaded blue ribbon spanning explicit lower and upper bounds around the line."

- slug: reference-lines
  section: annotations
  title: "Reference lines"
  description: '<a href="../reference/geoms/geom-abline.qmd"><code>geom-abline</code></a>, <a href="../reference/geoms/geom-hline.qmd"><code>geom-hline</code></a>, and <a href="../reference/geoms/geom-vline.qmd"><code>geom-vline</code></a> overlaid on a trend.'
  alt: "Scatter plot of a noisy upward trend over 20 steps crossed by a red diagonal, a green horizontal, and a blue vertical reference line."

- slug: text-labels
  section: annotations
  title: "Text and label annotations"
  description: 'Points annotated with <a href="../reference/geoms/geom-text.qmd"><code>geom-text</code></a> and boxed <a href="../reference/geoms/geom-label.qmd"><code>geom-label</code></a>.'
  alt: "Two scatter plots of four points labelled Alpha, Beta, Gamma, and Delta, one with plain text annotations and one with boxed labels."

- slug: shape-linetype
  section: annotations
  title: "Shape and linetype per group"
  description: 'A single grouping maps to <a href="../reference/scales/scale-shape.qmd"><code>scale-shape</code></a>, <a href="../reference/scales/scale-linetype.qmd"><code>scale-linetype</code></a>, and a discrete colour.'
  alt: "Line and point chart of three groups (A, B, and C) drawn with distinct point shapes, line dash styles, and colours per group."

- slug: colour-bar
  section: scales
  title: "Continuous colour guide"
  description: 'A colourbar appears automatically when colour is trained on a continuous variable via <a href="../reference/scales/scale-colour-continuous.qmd"><code>scale-colour-continuous</code></a>.'
  alt: "Scatter plot of a cosine wave where point colour encodes a continuous temperature variable shown by a vertical colourbar legend."

- slug: viridis-colour
  section: scales
  title: "Viridis continuous"
  description: '<a href="../reference/scales/scale-colour-viridis-c.qmd"><code>scale-colour-viridis-c</code></a> maps a continuous variable through the Viridis palette.'
  alt: "Scatter plot of a sinusoidal pattern with points coloured along the Viridis continuous palette encoding values from low to high."

- slug: manual-palette
  section: scales
  title: "Manual palette"
  description: 'User-supplied colours passed to <a href="../reference/scales/scale-colour-manual.qmd"><code>scale-colour-manual</code></a>.'
  alt: "Point and line chart of three groups (apple, berry, and cherry) drawn in a manual palette of red, orange, and teal."

- slug: facets
  section: facets
  title: "Facet wrap"
  description: 'One panel per level of a discrete variable via <a href="../reference/facets/facet-wrap.qmd"><code>facet-wrap</code></a>.'
  alt: "Scatter plot of car weight against miles per gallon, split into three facet-wrap panels by cylinder count (4, 6, and 8)."

- slug: facet-grid
  section: facets
  title: "Facet grid"
  description: 'Panels laid out on a row × column grid with <a href="../reference/facets/facet-grid.qmd"><code>facet-grid</code></a>.'
  alt: "Scatter plot arranged on a facet grid of two rows (female and male) and three columns (species A, B, and C)."

- slug: coord-clip
  section: facets
  title: "Cartesian zoom"
  description: '<a href="../reference/coord/coord-cartesian.qmd"><code>coord-cartesian</code></a> clips the view via <code>xlim</code> and <code>ylim</code> without dropping data.'
  alt: "Line and point chart of a quadratic curve from 0 to 25, clipped via Cartesian limits to show only x between 5 and 15."

- slug: themed
  section: themes
  title: "Minimal theme"
  description: 'Per-element overrides with <a href="../reference/themes/theme.qmd"><code>theme</code></a> on top of <a href="../reference/themes/theme-minimal.qmd"><code>theme-minimal</code></a>.'
  alt: "Three scatter plots of two groups drawn side by side, each using a different built-in theme: minimal, classic, and void."

- slug: theme-override
  section: themes
  title: "Theme overrides"
  description: 'Custom text sizes, panel fill, and grid colour passed through <a href="../reference/themes/theme.qmd"><code>theme</code></a>.'
  alt: "Line and point chart of the curve y equals 0.1 times x squared over 12 steps, rendered with enlarged axis titles and a cream panel background."

- slug: guide-axis
  section: guides
  title: "Rotating axis tick labels"
  description: '<a href="../reference/guides/guide-axis.qmd"><code>guide-axis</code></a> rotates or dodges discrete tick labels so long category names stay readable.'
  alt: "Three stacked bar charts of vehicle counts per manufacturer: the first overlaps the manufacturer labels, the second rotates them by 30 degrees, the third dodges them onto two rows."

- slug: guide-axis-logticks
  section: guides
  title: "Log-scale minor ticks"
  description: '<a href="../reference/guides/guide-axis-logticks.qmd"><code>guide-axis-logticks</code></a> draws minor ticks at log-scale subdivisions on a log10-transformed axis.'
  alt: "Two log-log scatter and line panels of the same seven points, the first showing only decade-aligned ticks and the second adding minor ticks at intermediate log-scale subdivisions."

- slug: guide-legend
  section: guides
  title: "Customising legends"
  description: 'Layout knobs on <a href="../reference/guides/guide-legend.qmd"><code>guide-legend</code></a>: <code>reverse</code> flips the key order, <code>ncol</code> wraps it onto multiple columns.'
  alt: "Three scatter plots of highway mpg against displacement coloured by vehicle class, contrasting the default legend with a reversed key order and a two-column legend layout."

- slug: axis-lims
  section: guides
  title: "Axis limits and tick rotation"
  description: 'Explicit domains set by <a href="../reference/scales/scale-x-continuous.qmd"><code>scale-x-continuous(limits:)</code></a> alongside tidied tick text from <a href="../reference/guides/guide-axis.qmd"><code>guide-axis</code></a>.'
  alt: "Three scatter plots of highway mpg against displacement showing the default view, the same view with rotated tick labels, and the view with explicit zero-anchored axis limits."

- slug: sec-axis
  section: guides
  title: "Secondary axes"
  description: 'Add a duplicate axis with <a href="../reference/scales/dup-axis.qmd"><code>dup-axis</code></a> or a derived axis via <code>sec-axis</code> on a continuous scale.'
  alt: "Scatter plot of highway mpg against displacement coloured by class, with the bottom and top edges sharing the displacement axis and the right edge showing the same scale converted to kilometres per litre."

- slug: geom-area
  section: geoms
  title: "Area chart"
  description: 'Filled polygon from y = 0 to y, drawn by <a href="../reference/geoms/geom-area.qmd"><code>geom-area</code></a>.'
  alt: "Area and line chart of monthly US unemployment from 2008 to 2009, with the area shaded blue under the rising line."

- slug: geom-step
  section: geoms
  title: "Stair-step interpolation"
  description: 'Discrete jumps between consecutive points via <a href="../reference/geoms/geom-step.qmd"><code>geom-step</code></a>.'
  alt: "Step chart of active users at each release from 2018 to 2024, with horizontal segments rising at every release year."

- slug: geom-path
  section: geoms
  title: "Paths follow row order"
  description: '<a href="../reference/geoms/geom-path.qmd"><code>geom-path</code></a> connects rows in input order, useful for trajectories.'
  alt: "Spiral path traced over a cartesian plane, with colour encoding traversal time from purple at the centre to yellow at the outer edge."

- slug: geom-polygon
  section: geoms
  title: "Filled polygons"
  description: 'Closed filled regions, one per group, drawn by <a href="../reference/geoms/geom-polygon.qmd"><code>geom-polygon</code></a>.'
  alt: "Three stacked polygons sketching altitude zones (lowlands, hills, peak) in green, orange, and blue."

- slug: geom-rect
  section: geoms
  title: "Rectangles from corners"
  description: '<a href="../reference/geoms/geom-rect.qmd"><code>geom-rect</code></a> draws filled boxes from <code>xmin</code>/<code>xmax</code>/<code>ymin</code>/<code>ymax</code>.'
  alt: "Four rectangles laid along a 2018-2024 timeline, each spanning a major version's lifetime with height encoding cumulative releases."

- slug: geom-segment
  section: geoms
  title: "Straight segments"
  description: 'Lines from (<code>x</code>, <code>y</code>) to (<code>xend</code>, <code>yend</code>) via <a href="../reference/geoms/geom-segment.qmd"><code>geom-segment</code></a>.'
  alt: "Four segments connecting team headcounts in 2020 to their 2024 values, each labelled by team in a distinct colour."

- slug: geom-curve
  section: geoms
  title: "Curved connectors"
  description: 'Quadratic bezier connectors with mapped colour via <a href="../reference/geoms/geom-curve.qmd"><code>geom-curve</code></a>.'
  alt: "Two side-by-side panels of the same source-to-sink connections, one with positive curvature bowing upward and the other flipped."

- slug: geom-spoke
  section: geoms
  title: "Vector field"
  description: '<a href="../reference/geoms/geom-spoke.qmd"><code>geom-spoke</code></a> draws short oriented segments from an angle and a radius.'
  alt: "Seven by seven grid of arrows pointing radially outward, with colour encoding distance from the origin via the Viridis palette."

- slug: geom-ellipse
  section: geoms
  title: "Parametric ellipses"
  description: 'Ellipses with mapped centre, semi-axes, and rotation via <a href="../reference/geoms/geom-ellipse.qmd"><code>geom-ellipse</code></a>.'
  alt: "Four overlapping ellipses sketching catchment regions, each tinted from a Set2 palette and labelled coastal, mountain, plateau, and valley."

- slug: geom-mark
  section: geoms
  title: "Cluster annotations"
  description: 'Enclose each cluster with a chosen shape via <a href="../reference/geoms/geom-mark.qmd"><code>geom-mark</code></a> (hull, ellipse, rect, circle).'
  alt: "Four scatter plots of penguin flipper length against body mass coloured by species, each surrounded by a different cluster shape (convex hull, ellipse, rectangle, circle)."

- slug: geom-tile
  section: geoms
  title: "Heatmap"
  description: '<a href="../reference/geoms/geom-tile.qmd"><code>geom-tile</code></a> renders an x/y/fill grid as filled rectangles.'
  alt: "Heatmap of hourly request volume across seven days and six hours of day, with the Viridis palette highlighting weekday midday peaks."

- slug: geom-count
  section: geoms
  title: "Counts as marker size"
  description: '<a href="../reference/geoms/geom-count.qmd"><code>geom-count</code></a> uses <a href="../reference/stats/stat-sum.qmd"><code>stat-sum</code></a> to draw one marker per unique (x, y) sized by count.'
  alt: "Bubble chart of vehicle frequency by cylinder count and class, with marker area scaled to the number of rows in each cell."

- slug: geom-freqpoly
  section: geoms
  title: "Frequency polygons"
  description: 'Line through binned counts via <a href="../reference/geoms/geom-freqpoly.qmd"><code>geom-freqpoly</code></a>, the line counterpart to a histogram.'
  alt: "Overlaid frequency-polygon lines of highway mpg distributions split by cylinder count, making the per-group shapes easy to compare."

- slug: geom-errorbarh
  section: geoms
  title: "Horizontal error bars"
  description: 'Per-category horizontal ranges via <a href="../reference/geoms/geom-errorbarh.qmd"><code>geom-errorbarh</code></a> with point estimates.'
  alt: "Forest-plot-style chart of seven vehicle classes with horizontal error bars spanning the 95% confidence interval around each highway mpg mean."

- slug: errorbar-family
  section: geoms
  title: "Errorbar geom family"
  description: 'Side-by-side comparison of <a href="../reference/geoms/geom-errorbar.qmd"><code>geom-errorbar</code></a>, <a href="../reference/geoms/geom-linerange.qmd"><code>geom-linerange</code></a>, <a href="../reference/geoms/geom-crossbar.qmd"><code>geom-crossbar</code></a>, and <a href="../reference/geoms/geom-pointrange.qmd"><code>geom-pointrange</code></a>.'
  alt: "Two by two grid of revenue across four quarters rendered with four different range geoms: errorbar with whiskers, linerange, crossbar with a filled box, and pointrange with a centre dot."

- slug: longtail-geoms
  section: geoms
  title: "Rug, blank, and function"
  description: '<a href="../reference/geoms/geom-rug.qmd"><code>geom-rug</code></a> for marginal density, <a href="../reference/geoms/geom-blank.qmd"><code>geom-blank</code></a> for empty frames, <a href="../reference/geoms/geom-function.qmd"><code>geom-function</code></a> for analytic curves.'
  alt: "Three stacked panels: a coloured scatter with marginal rug ticks, a sin(x) curve drawn over an empty frame, and a strip of rug ticks marking highway mpg observations."

- slug: draw-keys
  section: geoms
  title: "Per-geom legend glyphs"
  description: 'Layer geoms drive different legend glyphs: <a href="../reference/geoms/geom-line.qmd"><code>geom-line</code></a> renders as a stroke, <a href="../reference/geoms/geom-ribbon.qmd"><code>geom-ribbon</code></a> as a filled rectangle.'
  alt: "Forecast line with a confidence ribbon, with the legend showing a stroke glyph for the line series and a filled rectangle glyph for the confidence band."

- slug: jitter
  section: geoms
  title: "Jittered scatter"
  description: '<a href="../reference/geoms/geom-jitter.qmd"><code>geom-jitter</code></a> spreads coincident points using <a href="../reference/positions/position-jitter.qmd"><code>position-jitter</code></a>.'
  alt: "Scatter of highway mpg per vehicle class with horizontal jitter spreading overlapping points so the cluster density per class reads."

- slug: jitterdodge
  section: geoms
  title: "Jitter within dodged groups"
  description: '<a href="../reference/positions/position-jitterdodge.qmd"><code>position-jitterdodge</code></a> dodges colour groups apart, then jitters within each.'
  alt: "Scatter of trial responses across four weeks with three dose arms shown side by side, each arm dodged off the week and jittered inside its column."

- slug: boxplot
  section: stats
  title: "Boxplots per category"
  description: '<a href="../reference/stats/stat-boxplot.qmd"><code>stat-boxplot</code></a> reduces each group to a five-number summary; <a href="../reference/geoms/geom-boxplot.qmd"><code>geom-boxplot</code></a> draws the Tukey box.'
  alt: "Boxplots of highway mpg per vehicle class, with one filled box per class showing the inter-quartile range, whiskers, and outlier dots."

- slug: stat-summary
  section: stats
  title: "Mean ± SE summary"
  description: 'Per-x summary statistic via <a href="../reference/stats/stat-summary.qmd"><code>stat-summary</code></a>, layered over the raw points.'
  alt: "Highway mpg per cylinder count showing pale jittered raw points overlaid with a mean point and standard-error error bar at each cylinder level."

- slug: stat-function
  section: stats
  title: "Analytic curves"
  description: '<a href="../reference/stats/stat-function.qmd"><code>stat-function</code></a> samples an analytic function over <code>xlim</code> and routes the points to any line geom.'
  alt: "Two analytic curves, sin(x) in solid blue and cos(x) in dashed red, drawn over a shared x-range from minus pi to pi."

- slug: stat-ellipse
  section: stats
  title: "Per-group covariance ellipses"
  description: '<a href="../reference/stats/stat-ellipse.qmd"><code>stat-ellipse</code></a> draws the 95% covariance ellipse around each colour group.'
  alt: "Penguins flipper length against body mass coloured by species, with a 95% covariance ellipse drawn around each species cluster."

- slug: qq
  section: stats
  title: "Normal Q-Q plot"
  description: '<a href="../reference/geoms/geom-qq.qmd"><code>geom-qq</code></a> with <a href="../reference/geoms/geom-qq-line.qmd"><code>geom-qq-line</code></a> compares sample quantiles to a theoretical distribution.'
  alt: "Normal Q-Q plot of 80 simulated samples, with points hugging an IQR-fitted reference line."

- slug: qq-distributions
  section: stats
  title: "Q-Q against alternative distributions"
  description: 'Pass <code>distribution:</code> to <a href="../reference/stats/stat-qq.qmd"><code>stat-qq</code></a> / <a href="../reference/stats/stat-qq-line.qmd"><code>stat-qq-line</code></a> to compare against uniform or exponential references.'
  alt: "Three Q-Q panels comparing samples to normal, uniform, and exponential reference distributions, each with points following an IQR-fitted line."

- slug: weight
  section: stats
  title: "Weight aesthetic"
  description: 'Per-row weights threaded into counts and smoothers: bars sum the weight column, weighted least squares ignores down-weighted outliers.'
  alt: "Two stacked panels: a bar chart of regional visitor totals where bar height equals the summed weight column, and a weighted-least-squares scatter where two outliers are ignored thanks to negligible weights."

- slug: longtail-stats
  section: stats
  title: "ECDF and unique points"
  description: '<a href="../reference/stats/stat-ecdf.qmd"><code>stat-ecdf</code></a> draws an empirical CDF; <a href="../reference/stats/stat-unique.qmd"><code>stat-unique</code></a> collapses repeated rows.'
  alt: "Two side-by-side panels: an empirical CDF of highway mpg drawn as a step-up curve, and a deduplicated scatter where repeated points have been collapsed into a single marker each."

- slug: scale-alpha
  section: scales
  title: "Alpha scale family"
  description: 'Continuous, manual per-level, and binned variants via the <a href="../reference/scales/scale-alpha-continuous.qmd"><code>scale-alpha-*</code></a> family.'
  alt: "Three stacked scatter panels showing the same blue points with point opacity driven by continuous, manual per-level, and binned alpha scales."

- slug: scale-linewidth
  section: scales
  title: "Linewidth scale family"
  description: 'Continuous, manual per-level, and binned variants via the <a href="../reference/scales/scale-linewidth-continuous.qmd"><code>scale-linewidth-*</code></a> family.'
  alt: "Three stacked line panels with stroke thickness driven by continuous, manual per-level, and binned linewidth scales."

- slug: scale-stroke
  section: scales
  title: "Stroke scale family"
  description: 'Marker-outline thickness driven by the <code>stroke</code> aesthetic via <a href="../reference/scales/scale-stroke-continuous.qmd"><code>scale-stroke-continuous</code></a> or <a href="../reference/scales/scale-stroke-manual.qmd"><code>scale-stroke-manual</code></a>.'
  alt: "Two stacked panels of blue circles whose outline thickness is driven by continuous and manual stroke scales."

- slug: scale-size-radius
  section: scales
  title: "Size and radius scales"
  description: '<a href="../reference/scales/scale-radius.qmd"><code>scale-radius</code></a>, <a href="../reference/scales/scale-size-area.qmd"><code>scale-size-area</code></a>, and <a href="../reference/scales/scale-size-manual.qmd"><code>scale-size-manual</code></a> compared on the same data.'
  alt: "Three stacked scatter panels with marker size driven by linear radius, area-preserving square-root, and manual per-level size scales."

- slug: scale-shape-linetype-binned
  section: scales
  title: "Binned shape and linetype"
  description: 'Cut a continuous variable into bins with <a href="../reference/scales/scale-shape-binned.qmd"><code>scale-shape-binned</code></a> or <a href="../reference/scales/scale-linetype-binned.qmd"><code>scale-linetype-binned</code></a>.'
  alt: "Three stacked panels: scatters where marker shape is binned by a continuous variable, and a line chart where dash patterns are binned across six groups."

- slug: scale-binned
  section: scales
  title: "Binned colour and size"
  description: 'Stepped colour gradients and area-preserving size scales via <a href="../reference/scales/scale-fill-steps.qmd"><code>scale-fill-steps</code></a>, <a href="../reference/scales/scale-fill-fermenter.qmd"><code>scale-fill-fermenter</code></a>, and <a href="../reference/scales/scale-size-area.qmd"><code>scale-size-area</code></a>.'
  alt: "Three side-by-side scatter panels comparing a 5-bin stepped fill, a 7-bin Spectral fermenter palette, and a sub-linear size-area scale."

- slug: scale-brewer-gradient
  section: scales
  title: "ColorBrewer and gradient fills"
  description: 'Discrete <a href="../reference/scales/scale-fill-brewer.qmd"><code>scale-fill-brewer</code></a> palettes alongside continuous <a href="../reference/scales/scale-fill-gradient.qmd"><code>scale-fill-gradient</code></a> and <a href="../reference/scales/scale-fill-gradient2.qmd"><code>scale-fill-gradient2</code></a>.'
  alt: "Two by two grid contrasting Set1 and Spectral discrete brewer palettes with two-stop and diverging continuous gradient fills."

- slug: scale-niche
  section: scales
  title: "Grey, hue, and distiller fills"
  description: 'Niche fill scales: <a href="../reference/scales/scale-fill-grey.qmd"><code>scale-fill-grey</code></a>, <a href="../reference/scales/scale-fill-hue.qmd"><code>scale-fill-hue</code></a>, and <a href="../reference/scales/scale-fill-distiller.qmd"><code>scale-fill-distiller</code></a>.'
  alt: "Three side-by-side scatter panels rendered with a discrete grey ramp, a discrete hue wheel, and a continuous Spectral distiller palette."

- slug: scale-date
  section: scales
  title: "Date axis"
  description: 'ISO date strings on x parsed and laid out by <a href="../reference/scales/scale-x-date.qmd"><code>scale-x-date</code></a> with year-month tick labels.'
  alt: "Line and point chart of the US personal savings rate from 2008 to 2009 with year-month axis labels along the bottom."

- slug: scale-log-sqrt-reverse
  section: scales
  title: "Log, sqrt, and reverse axes"
  description: 'Continuous axis transformations via <a href="../reference/scales/scale-y-log10.qmd"><code>scale-y-log10</code></a>, <a href="../reference/scales/scale-y-sqrt.qmd"><code>scale-y-sqrt</code></a>, and <a href="../reference/scales/scale-y-reverse.qmd"><code>scale-y-reverse</code></a>.'
  alt: "Two by two grid showing the same exponential growth curve under linear, log10, square-root, and reversed y-axis transformations."

- slug: scale-expand
  section: scales
  title: "Axis expansion"
  description: 'Tune axis breathing room via <a href="../reference/scales/scale-x-continuous.qmd"><code>scale-*-continuous(expand:)</code></a> or via <a href="../reference/coord/coord-cartesian.qmd"><code>coord-cartesian(expand: false)</code></a>.'
  alt: "Three side-by-side scatter panels comparing the default 5% expansion, scales with expand set to false, and coord-cartesian with expand set to false."

- slug: identity-scales
  section: scales
  title: "Identity scales"
  description: '<a href="../reference/scales/scale-colour-identity.qmd"><code>scale-colour-identity</code></a> and <a href="../reference/scales/scale-shape-identity.qmd"><code>scale-shape-identity</code></a> pass column values directly to the visual property.'
  alt: "Scatter of five points where hex colour strings drive marker fill and shape names drive marker glyph directly via identity scales."

- slug: refs-trans
  section: scales
  title: "Reference lines through axis transforms"
  description: '<a href="../reference/geoms/geom-hline.qmd"><code>geom-hline</code></a> intercepts route through the active y-axis transform so they land at the correct log positions.'
  alt: "Line and point chart of an exponential curve on a log10 y axis with three dashed red horizontal reference lines at y equals 10, 100, and 1000."

- slug: facet-wrap-free
  section: facets
  title: "Free y per panel"
  description: 'Pass <code>scales: "free_y"</code> to <a href="../reference/facets/facet-wrap.qmd"><code>facet-wrap</code></a> so each panel trains its own y range.'
  alt: "Three side-by-side line panels (millis, seconds, minutes) where each panel trains its own y axis to match its very different value range."

- slug: facet-wrap-free-xy
  section: facets
  title: "Free x and y per panel"
  description: 'Pass <code>scales: "free"</code> to <a href="../reference/facets/facet-wrap.qmd"><code>facet-wrap</code></a> to train both axes per panel.'
  alt: "Three side-by-side line panels (near, mid, far) where each panel trains its own x and y range to match very different domains."

- slug: facet-labellers
  section: facets
  title: "Strip labellers"
  description: '<a href="../reference/facets/label-both.qmd"><code>label-both</code></a> prefixes each strip with the facet variable name (e.g., <code>cyl: 4</code>).'
  alt: "Three facet panels of highway mpg against displacement coloured by class, with strip labels reading cyl colon four, six, and eight."

- slug: facet-smooth
  section: facets
  title: "Per-panel smoother"
  description: '<a href="../reference/geoms/geom-smooth.qmd"><code>geom-smooth</code></a> inside <a href="../reference/facets/facet-wrap.qmd"><code>facet-wrap</code></a> fits each panel only on its own subset.'
  alt: "Three facet panels of highway mpg against displacement, each with its own linear smoother and 95% confidence ribbon fitted to that panel's rows."

- slug: coord-flip
  section: facets
  title: "Coordinate flip"
  description: '<a href="../reference/coord/coord-flip.qmd"><code>coord-flip</code></a> swaps x and y so vertical bars read horizontally.'
  alt: "Two stacked bar charts of revenue per quarter, the first with vertical bars and the second flipped to horizontal bars via coord-flip."

- slug: coord-fixed
  section: facets
  title: "Fixed aspect ratio"
  description: '<a href="../reference/coord/coord-fixed.qmd"><code>coord-fixed</code></a> locks one x unit equal to <code>ratio</code> y units regardless of panel size.'
  alt: "Two stacked line plots of y equals x, the first using the default cartesian ratio and the second locked to a 1:1 ratio via coord-fixed."

- slug: coord-fixed-facet
  section: facets
  title: "Fixed ratio with facets"
  description: '<a href="../reference/coord/coord-fixed.qmd"><code>coord-fixed</code></a> applies inside every <a href="../reference/facets/facet-wrap.qmd"><code>facet-wrap</code></a> panel.'
  alt: "Three facet panels of three parallel lines (y equals x, y equals x plus 1, y equals x minus 1), each panel locked to a 1:1 unit ratio."

- slug: annotate
  section: annotations
  title: "Ad-hoc annotations"
  description: '<a href="../reference/geoms/annotate.qmd"><code>annotate</code></a> places extra layers (text, vline) without joining them to the data table.'
  alt: "Annotated line and point chart with a red dashed vertical reference line at x equals 5, a peak label above the curve, and a series A label tucked into the upper left."

- slug: annotate-typst
  section: annotations
  title: "Typst markup in annotations"
  description: '<code>annotate("typst", label: "...")</code> always evaluates the label as Typst markup; <a href="../reference/core/typst.qmd"><code>typst()</code></a> forces evaluation inside <code>annotate("text", ...)</code>.'
  alt: "Annotated line and point chart with a bold-italic peak label rendered as Typst markup and a series A label using the typst() forcing tag."

- slug: theme-set
  section: themes
  title: "Global theme default"
  description: '<a href="../reference/themes/theme-set.qmd"><code>theme-set</code></a> installs a global default; explicit <code>theme:</code> arguments still take precedence per plot.'
  alt: "Two stacked penguin scatter plots: the first inherits a globally-installed theme-minimal, the second overrides it with theme-dark."

- slug: themes-gallery
  section: themes
  title: "Theme presets"
  description: 'Side-by-side gallery of <a href="../reference/themes/theme-bw.qmd"><code>theme-bw</code></a>, <a href="../reference/themes/theme-linedraw.qmd"><code>theme-linedraw</code></a>, <a href="../reference/themes/theme-light.qmd"><code>theme-light</code></a>, <a href="../reference/themes/theme-dark.qmd"><code>theme-dark</code></a>, <a href="../reference/themes/theme-test.qmd"><code>theme-test</code></a>, and <a href="../reference/themes/theme-minimal.qmd"><code>theme-minimal</code></a>.'
  alt: "Two by three grid of the same two-group scatter rendered with theme-minimal, theme-bw, theme-linedraw, theme-light, theme-dark, and theme-test."

- slug: margin
  section: themes
  title: "Plot margins"
  description: '<a href="../reference/themes/margin.qmd"><code>margin</code></a> defaults every side to <code>auto</code>; pass explicit lengths to pin individual sides while the others fall through to the renderer''s dynamic default.'
  alt: "Three stacked panels of the same scatter, the first with default margins, the second with all four margins pinned via margin(), and the third with only top and left pinned via margin() (other sides auto)."

- slug: dodge-mixed
  section: bars
  title: "Mixed-width dodge"
  description: 'Per-row <code>width</code> column lets <a href="../reference/positions/position-dodge.qmd"><code>position-dodge</code></a> give one product a wider slot than another.'
  alt: "Dodged bar chart of revenue per quarter where product A bars are visibly wider than product B bars within each quarter."

- slug: bin-2d
  section: stats
  title: "Rectangular 2D binning"
  description: 'Drop (x, y) samples into a uniform grid via <a href="../reference/geoms/geom-bin-2d.qmd"><code>geom-bin-2d</code></a>; cells colour by count.'
  alt: "Spiral cloud of 600 points binned into a 25-by-25 grid, with cells coloured by count along the magma palette and empty bins suppressed."

- slug: hex
  section: stats
  title: "Hexagonal binning"
  description: 'Pointy-top hex cells via <a href="../reference/geoms/geom-hex.qmd"><code>geom-hex</code></a>, the hexagonal counterpart to <a href="../reference/geoms/geom-bin-2d.qmd"><code>geom-bin-2d</code></a>.'
  alt: "Spiral cloud of 800 points binned into pointy-top hexagons, with cells coloured by count along the viridis palette and empty bins suppressed."

- slug: contour
  section: stats
  title: "Contour lines"
  description: 'Marching-squares iso-lines on a regular (x, y, z) grid via <a href="../reference/geoms/geom-contour.qmd"><code>geom-contour</code></a>.'
  alt: "Twelve concentric contour lines tracing a radial wave field on a 60-by-60 grid, coloured by level along the viridis palette."

- slug: contour-filled
  section: stats
  title: "Filled contour bands"
  description: 'Closed iso-bands between contour levels via <a href="../reference/geoms/geom-contour-filled.qmd"><code>geom-contour-filled</code></a>.'
  alt: "Ten filled contour bands tracing a radial wave field on a 50-by-50 grid, coloured by level along the magma palette."

- slug: geom-quantile
  section: stats
  title: "Quantile regression lines"
  description: 'Per-tau quantile regression curves via <a href="../reference/geoms/geom-quantile.qmd"><code>geom-quantile</code></a>.'
  alt: "Two stacked scatter panels with quantile regression lines: the first showing the default 0.25, 0.5, and 0.75 lines, the second showing 0.1, 0.5, and 0.9 decile bands."

- slug: stat-summary-2d
  section: stats
  title: "2D summary reduction"
  description: '<a href="../reference/stats/stat-summary-2d.qmd"><code>stat-summary-2d</code></a> reduces a <code>z</code> aesthetic over a grid; cells colour by the mean rather than the count.'
  alt: "Spiral cloud of 600 points reduced over a 25-by-25 grid, with each cell coloured by the mean radius along the viridis palette."

- slug: geom-dotplot
  section: geoms
  title: "Stacked dotplot"
  description: 'Stacked dots over a binned x distribution via <a href="../reference/geoms/geom-dotplot.qmd"><code>geom-dotplot</code></a>; tune <code>bins</code>, <code>binwidth</code>, <code>dotsize</code>, and <code>stackratio</code>.'
  alt: "Three stacked dotplot panels of the same distribution: 14 equal-width bins, a wider 0.4 binwidth with 0.9 dotsize, and a 1.4 stackratio leaving gaps between dots."

- slug: geom-typst-const
  section: annotations
  title: "Constant Typst content labels"
  description: 'Set a content block on every row via <a href="../reference/geoms/geom-typst.qmd"><code>geom-typst(label: [...])</code></a>; or place a single content label with <code>annotate("typst", label: [...])</code>.'
  alt: "Line and point chart with a star glyph above every observation rendered as Typst content, plus a bold peak alpha label tucked above the curve."

- slug: scale-log-pre-stat
  section: scales
  title: "Log scale pre-transforms data"
  description: '<a href="../reference/scales/scale-x-log10.qmd"><code>scale-x-log10</code></a> transforms data before stats run; <a href="../reference/geoms/geom-smooth.qmd"><code>geom-smooth</code></a> fits the line in log space.'
  alt: "Two stacked panels of the same power-law dataset with a linear smoother: the linear x panel curves while the log10 x panel produces a straight line."

- slug: coord-radial-clock
  section: facets
  title: "Radial clock layout"
  description: 'Wrap an hourly series around a circle via <code>coord-radial(theta: "x")</code>: hour drives the angle and load the radius.'
  alt: "Circular clock-face plot of 24 hourly load observations connected by a closed line and points, traced around the perimeter of a radial panel."

- slug: coord-radial-half
  section: facets
  title: "Half-sweep radial layout"
  description: 'Pass <code>end: calc.pi</code> to <code>coord-radial</code> for a partial sweep; the panel becomes a half-circle and domain endpoints land at distinct angles instead of stacking.'
  alt: "Half-circle radial plot of 13 hourly load samples connected by a line, sweeping from 12 o'clock clockwise to 6 o'clock."

- slug: coord-radial-pie
  section: facets
  title: "Pie chart via radial coordinates"
  description: '<code>coord-radial(theta: "y")</code> with stacked <a href="../reference/geoms/geom-col.qmd"><code>geom-col</code></a> turns one stacked bar into a pie chart of revenue share.'
  alt: "Pie chart of revenue share split across five regions (EU, US, APAC, LATAM, and Other), produced by stacking columns under coord-radial(theta: y)."

- slug: coord-radial-radar
  section: facets
  title: "Radar chart"
  description: 'Closed polygon under <code>coord-radial(theta: "x")</code> with one vertex per axis, drawn via <a href="../reference/geoms/geom-polygon.qmd"><code>geom-polygon</code></a>.'
  alt: "Radar chart of a six-axis vehicle profile, showing a translucent blue polygon and points at each axis vertex inside a circular radial panel."

- slug: coord-radial-rose
  section: facets
  title: "Rose chart"
  description: 'Discrete categories distributed around the circle via <code>coord-radial(theta: "x")</code> with <a href="../reference/geoms/geom-col.qmd"><code>geom-col</code></a>; bar height encodes the count.'
  alt: "Rose chart of wind direction counts across eight compass points (N, NE, E, SE, S, SW, W, and NW), with bar height encoding the count and each bar filled by direction."

- slug: coord-transform
  section: facets
  title: "Coordinate-level transforms"
  description: '<a href="../reference/coord/coord-transform.qmd"><code>coord-transform</code></a> warps the displayed coordinates without setting <code>transform</code> on each scale; overrides any scale-level transform.'
  alt: "Two stacked panels of the same power-law dataset: the first applies log10 to both axes via coord-transform, the second mixes scale-y sqrt with coord-transform x log10."
