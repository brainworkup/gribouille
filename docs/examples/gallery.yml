# Examples gallery data, consumed by the listing in `index.qmd` and by
# `assets/lua/examples-data.lua` (which injects the modal source blocks).
# One entry per `.typ` file in `examples/` (project root).
# `description` is inline HTML; the gallery EJS template emits it unescaped.

- slug: minimal
  section: basics
  title: "Minimal scatter"
  description: 'Inline iris sample plotted with a single <a href="../reference/geoms/geom-point.qmd"><code>geom-point</code></a> layer and continuous x/y scales.'
  alt: "Scatter plot of iris sepal width against sepal length with points coloured by species across setosa, versicolor, and virginica."

- slug: multilayer
  section: basics
  title: "Multilayer trend"
  description: 'Lines and points share a discrete colour mapping. <a href="../reference/geoms/geom-line.qmd"><code>geom-line</code></a> + <a href="../reference/geoms/geom-point.qmd"><code>geom-point</code></a>.'
  alt: "Line and point chart of monthly sales from month 1 to 6 for three regions (north, south, and east), all trending upwards."

- slug: labs-title
  section: basics
  title: "Titles and labels"
  description: 'Title, subtitle, caption, and axis labels set in a single <a href="../reference/labs/labs.qmd"><code>labs</code></a> call.'
  alt: "Scatter and line chart of count against month showing a rising trend, framed by a title, subtitle, caption, and axis labels."

- slug: factor-inline
  section: basics
  title: "Inline factor coercion"
  description: '<a href="../reference/helpers/as-factor.qmd"><code>as-factor</code></a> forces a numeric column to be treated as discrete for the colour aesthetic.'
  alt: "Scatter plot of a noisy sinusoidal pattern with points coloured by a three-level cluster factor coerced from a numeric column."

- slug: penguins
  section: basics
  title: "Penguins"
  description: "CSV-loaded dataset: flipper length versus body mass, coloured by species."
  alt: "Scatter plot of penguin body mass against flipper length, with points coloured by species revealing three separated clusters."

- slug: bar-simple
  section: bars
  title: "Simple bars"
  description: 'Discrete x counted with <a href="../reference/geoms/geom-bar.qmd"><code>geom-bar</code></a>.'
  alt: "Bar chart of counts per fruit for four categories (apple, banana, cherry, and date), with banana tallest and cherry shortest."

- slug: bar-count
  section: bars
  title: "Category counts"
  description: '<a href="../reference/geoms/geom-bar.qmd"><code>geom-bar</code></a> backed by <a href="../reference/stats/stat-count.qmd"><code>stat-count</code></a> to tally observations per category.'
  alt: "Bar chart counting observations per category from A to D, with D the tallest and B the shortest."

- slug: bar-stacked
  section: bars
  title: "Stacked bars"
  description: '<a href="../reference/geoms/geom-col.qmd"><code>geom-col</code></a> with <a href="../reference/positions/position-stack.qmd"><code>position-stack</code></a> for cumulative totals per group.'
  alt: "Stacked bar chart of revenue per quarter (Q1 to Q3), with each bar split into contributions from products A, B, and C."

- slug: bar-dodged
  section: bars
  title: "Dodged bars"
  description: 'Side-by-side bars per group via <a href="../reference/positions/position-dodge.qmd"><code>position-dodge</code></a> on <a href="../reference/geoms/geom-col.qmd"><code>geom-col</code></a>.'
  alt: "Grouped bar chart of revenue per quarter (Q1 to Q3) with products A, B, and C shown as side-by-side bars within each quarter."

- slug: bar-filled
  section: bars
  title: "Filled bars"
  description: 'Each column normalised to 1 with <a href="../reference/positions/position-fill.qmd"><code>position-fill</code></a> to compare shares.'
  alt: "Proportional bar chart where each quarter's total is normalised to 1, showing the share of revenue from products A, B, and C."

- slug: histogram
  section: stats
  title: "Histogram"
  description: 'Continuous x binned with <a href="../reference/stats/stat-bin.qmd"><code>stat-bin</code></a> via <a href="../reference/geoms/geom-histogram.qmd"><code>geom-histogram</code></a>.'
  alt: "Histogram of a continuous value across 12 bins from 0 to 10, with most observations concentrated between roughly 6 and 7."

- slug: smooth
  section: stats
  title: "Smoother"
  description: 'Scatter plus a linear fit with a 95% confidence ribbon from <a href="../reference/geoms/geom-smooth.qmd"><code>geom-smooth</code></a>.'
  alt: "Scatter plot of y against x overlaid with a linear smoother and its 95% confidence ribbon, showing a strong positive trend."

- slug: ribbon-bounds
  section: stats
  title: "Ribbon bounds"
  description: 'Explicit <code>ymin</code> / <code>ymax</code> aesthetics drive <a href="../reference/geoms/geom-ribbon.qmd"><code>geom-ribbon</code></a> around a fitted line.'
  alt: "Line chart of an upward trend over 20 steps with a shaded blue ribbon showing explicit lower and upper bounds around the line."

- slug: reference-lines
  section: annotations
  title: "Reference lines"
  description: '<a href="../reference/geoms/geom-abline.qmd"><code>geom-abline</code></a>, <a href="../reference/geoms/geom-hline.qmd"><code>geom-hline</code></a>, and <a href="../reference/geoms/geom-vline.qmd"><code>geom-vline</code></a> overlaid on a trend.'
  alt: "Scatter plot of a noisy upward trend over 20 steps crossed by a red diagonal, a green horizontal, and a blue vertical reference line."

- slug: text-labels
  section: annotations
  title: "Text and label annotations"
  description: 'Points annotated with <a href="../reference/geoms/geom-text.qmd"><code>geom-text</code></a> and boxed <a href="../reference/geoms/geom-label.qmd"><code>geom-label</code></a>.'
  alt: "Two scatter plots of four points labelled Alpha, Beta, Gamma, and Delta, one with plain text annotations and one with boxed labels."

- slug: shape-linetype
  section: annotations
  title: "Shape and linetype per group"
  description: 'A single grouping maps to <a href="../reference/scales/scale-shape.qmd"><code>scale-shape</code></a>, <a href="../reference/scales/scale-linetype.qmd"><code>scale-linetype</code></a>, and a discrete colour.'
  alt: "Line and point chart of three groups (A, B, and C) drawn with distinct point shapes, line dash styles, and colours per group."

- slug: colour-bar
  section: scales
  title: "Continuous colour guide"
  description: 'A colourbar appears automatically when colour is trained on a continuous variable via <a href="../reference/scales/scale-colour-continuous.qmd"><code>scale-colour-continuous</code></a>.'
  alt: "Scatter plot of a cosine wave where point colour encodes a continuous temperature variable shown by a vertical colourbar legend."

- slug: viridis-colour
  section: scales
  title: "Viridis continuous"
  description: '<a href="../reference/scales/scale-colour-viridis-c.qmd"><code>scale-colour-viridis-c</code></a> maps a continuous variable through the Viridis palette.'
  alt: "Scatter plot of a sinusoidal pattern with points coloured along the Viridis continuous palette encoding values from low to high."

- slug: manual-palette
  section: scales
  title: "Manual palette"
  description: 'User-supplied colours passed to <a href="../reference/scales/scale-colour-manual.qmd"><code>scale-colour-manual</code></a>.'
  alt: "Point and line chart of three groups (apple, berry, and cherry) drawn in a manual palette of red, orange, and teal."

- slug: facets
  section: facets
  title: "Facet wrap"
  description: 'One panel per level of a discrete variable via <a href="../reference/facets/facet-wrap.qmd"><code>facet-wrap</code></a>.'
  alt: "Scatter plot of car weight against miles per gallon, split into three facet-wrap panels by cylinder count (4, 6, and 8)."

- slug: facet-grid
  section: facets
  title: "Facet grid"
  description: 'Panels laid out on a row × column grid with <a href="../reference/facets/facet-grid.qmd"><code>facet-grid</code></a>.'
  alt: "Scatter plot arranged on a facet grid of two rows (female and male) and three columns (species A, B, and C)."

- slug: coord-clip
  section: facets
  title: "Cartesian zoom"
  description: '<a href="../reference/coord/coord-cartesian.qmd"><code>coord-cartesian</code></a> clips the view via <code>xlim</code> and <code>ylim</code> without dropping data.'
  alt: "Line and point chart of a quadratic curve from 0 to 25, clipped via Cartesian limits to show only x between 5 and 15."

- slug: themed
  section: themes
  title: "Minimal theme"
  description: 'Per-element overrides with <a href="../reference/themes/theme.qmd"><code>theme</code></a> on top of <a href="../reference/themes/theme-minimal.qmd"><code>theme-minimal</code></a>.'
  alt: "Three scatter plots of two groups drawn side by side, each using a different built-in theme: minimal, classic, and void."

- slug: theme-override
  section: themes
  title: "Theme overrides"
  description: 'Custom text sizes, panel fill, and grid colour passed through <a href="../reference/themes/theme.qmd"><code>theme</code></a>.'
  alt: "Line and point chart of the curve y equals 0.1 times x squared over 12 steps, rendered with enlarged axis titles and a cream panel background."

- slug: guide-axis
  section: guides
  title: "Rotating axis tick labels"
  description: '<a href="../reference/guides/guide-axis.qmd"><code>guide-axis</code></a> rotates or dodges discrete tick labels so long category names stay readable.'
  alt: "Three stacked bar charts of vehicle counts per manufacturer: the first overlaps the manufacturer labels, the second rotates them by 30 degrees, the third dodges them onto two rows."

- slug: guide-axis-logticks
  section: guides
  title: "Log-scale minor ticks"
  description: '<a href="../reference/guides/guide-axis-logticks.qmd"><code>guide-axis-logticks</code></a> draws minor ticks at log-scale subdivisions on a log10-transformed axis.'
  alt: "Two log-log scatter and line panels of the same seven points, the first showing only decade-aligned ticks and the second adding minor ticks at intermediate log-scale subdivisions."

- slug: guide-legend
  section: guides
  title: "Customising legends"
  description: 'Layout knobs on <a href="../reference/guides/guide-legend.qmd"><code>guide-legend</code></a>: <code>reverse</code> flips the key order, <code>ncol</code> wraps it onto multiple columns.'
  alt: "Three scatter plots of highway mpg against displacement coloured by vehicle class, contrasting the default legend with a reversed key order and a two-column legend layout."

- slug: axis-lims
  section: guides
  title: "Axis limits and tick rotation"
  description: 'Explicit domains set by <a href="../reference/scales/scale-x-continuous.qmd"><code>scale-x-continuous(limits:)</code></a> alongside tidied tick text from <a href="../reference/guides/guide-axis.qmd"><code>guide-axis</code></a>.'
  alt: "Three scatter plots of highway mpg against displacement showing the default view, the same view with rotated tick labels, and the view with explicit zero-anchored axis limits."

- slug: sec-axis
  section: guides
  title: "Secondary axes"
  description: 'Add a duplicate axis with <a href="../reference/scales/dup-axis.qmd"><code>dup-axis</code></a> or a derived axis via <code>sec-axis</code> on a continuous scale.'
  alt: "Scatter plot of highway mpg against displacement coloured by class, with the bottom and top edges sharing the displacement axis and the right edge showing the same scale converted to kilometres per litre."

- slug: geom-area
  section: geoms
  title: "Area chart"
  description: 'Filled polygon from y = 0 to y, drawn by <a href="../reference/geoms/geom-area.qmd"><code>geom-area</code></a>.'
  alt: "Area and line chart of monthly US unemployment from 2008 to 2009, with the area shaded blue under the rising line."

- slug: geom-step
  section: geoms
  title: "Stair-step interpolation"
  description: 'Discrete jumps between consecutive points via <a href="../reference/geoms/geom-step.qmd"><code>geom-step</code></a>.'
  alt: "Step chart of active users at each release from 2018 to 2024, with horizontal segments rising at every release year."

- slug: geom-path
  section: geoms
  title: "Paths follow row order"
  description: '<a href="../reference/geoms/geom-path.qmd"><code>geom-path</code></a> connects rows in input order, useful for trajectories.'
  alt: "Spiral path traced over a cartesian plane, with colour encoding traversal time from purple at the centre to yellow at the outer edge."

- slug: geom-polygon
  section: geoms
  title: "Filled polygons"
  description: 'Closed filled regions, one per group, drawn by <a href="../reference/geoms/geom-polygon.qmd"><code>geom-polygon</code></a>.'
  alt: "Three stacked polygons sketching altitude zones (lowlands, hills, peak) in green, orange, and blue."

- slug: geom-rect
  section: geoms
  title: "Rectangles from corners"
  description: '<a href="../reference/geoms/geom-rect.qmd"><code>geom-rect</code></a> draws filled boxes from <code>xmin</code>/<code>xmax</code>/<code>ymin</code>/<code>ymax</code>.'
  alt: "Four rectangles laid along a 2018-2024 timeline, each spanning a major version's lifetime with height encoding cumulative releases."

- slug: geom-segment
  section: geoms
  title: "Straight segments"
  description: 'Lines from (<code>x</code>, <code>y</code>) to (<code>xend</code>, <code>yend</code>) via <a href="../reference/geoms/geom-segment.qmd"><code>geom-segment</code></a>.'
  alt: "Four segments connecting team headcounts in 2020 to their 2024 values, each labelled by team in a distinct colour."

- slug: geom-curve
  section: geoms
  title: "Curved connectors"
  description: 'Quadratic bezier connectors with mapped colour via <a href="../reference/geoms/geom-curve.qmd"><code>geom-curve</code></a>.'
  alt: "Two side-by-side panels of the same source-to-sink connections, one with positive curvature bowing upward and the other flipped."

- slug: geom-spoke
  section: geoms
  title: "Vector field"
  description: '<a href="../reference/geoms/geom-spoke.qmd"><code>geom-spoke</code></a> draws short oriented segments from an angle and a radius.'
  alt: "Seven by seven grid of arrows pointing radially outward, with colour encoding distance from the origin via the Viridis palette."

- slug: geom-ellipse
  section: geoms
  title: "Parametric ellipses"
  description: 'Ellipses with mapped centre, semi-axes, and rotation via <a href="../reference/geoms/geom-ellipse.qmd"><code>geom-ellipse</code></a>.'
  alt: "Four overlapping ellipses sketching catchment regions, each tinted from a Set2 palette and labelled coastal, mountain, plateau, and valley."

- slug: geom-mark
  section: geoms
  title: "Cluster annotations"
  description: 'Enclose each cluster with a chosen shape via <a href="../reference/geoms/geom-mark.qmd"><code>geom-mark</code></a> (hull, ellipse, rect, circle).'
  alt: "Four scatter plots of penguin flipper length against body mass coloured by species, each surrounded by a different cluster shape (convex hull, ellipse, rectangle, circle)."

- slug: geom-tile
  section: geoms
  title: "Heatmap"
  description: '<a href="../reference/geoms/geom-tile.qmd"><code>geom-tile</code></a> renders an x/y/fill grid as filled rectangles.'
  alt: "Heatmap of hourly request volume across seven days and six hours of day, with the Viridis palette highlighting weekday midday peaks."

- slug: geom-count
  section: geoms
  title: "Counts as marker size"
  description: '<a href="../reference/geoms/geom-count.qmd"><code>geom-count</code></a> uses <a href="../reference/stats/stat-sum.qmd"><code>stat-sum</code></a> to draw one marker per unique (x, y) sized by count.'
  alt: "Bubble chart of vehicle frequency by cylinder count and class, with marker area scaled to the number of rows in each cell."

- slug: geom-freqpoly
  section: geoms
  title: "Frequency polygons"
  description: 'Line through binned counts via <a href="../reference/geoms/geom-freqpoly.qmd"><code>geom-freqpoly</code></a>, the line counterpart to a histogram.'
  alt: "Overlaid frequency-polygon lines of highway mpg distributions split by cylinder count, making the per-group shapes easy to compare."

- slug: geom-errorbarh
  section: geoms
  title: "Horizontal error bars"
  description: 'Per-category horizontal ranges via <a href="../reference/geoms/geom-errorbarh.qmd"><code>geom-errorbarh</code></a> with point estimates.'
  alt: "Forest-plot-style chart of seven vehicle classes with horizontal error bars spanning the 95% confidence interval around each highway mpg mean."

- slug: errorbar-family
  section: geoms
  title: "Errorbar geom family"
  description: 'Side-by-side comparison of <a href="../reference/geoms/geom-errorbar.qmd"><code>geom-errorbar</code></a>, <a href="../reference/geoms/geom-linerange.qmd"><code>geom-linerange</code></a>, <a href="../reference/geoms/geom-crossbar.qmd"><code>geom-crossbar</code></a>, and <a href="../reference/geoms/geom-pointrange.qmd"><code>geom-pointrange</code></a>.'
  alt: "Two by two grid of revenue-per-quarter charts rendered with four different range geoms: errorbar with whiskers, linerange, crossbar with a filled box, and pointrange with a centre dot."

- slug: longtail-geoms
  section: geoms
  title: "Rug, blank, and function"
  description: '<a href="../reference/geoms/geom-rug.qmd"><code>geom-rug</code></a> for marginal density, <a href="../reference/geoms/geom-blank.qmd"><code>geom-blank</code></a> for empty frames, <a href="../reference/geoms/geom-function.qmd"><code>geom-function</code></a> for analytic curves.'
  alt: "Three stacked panels: a coloured scatter with marginal rug ticks, a sin(x) curve drawn over an empty frame, and a strip of rug ticks marking highway mpg observations."

- slug: draw-keys
  section: geoms
  title: "Per-geom legend glyphs"
  description: 'Layer geoms drive different legend glyphs: lines render as strokes, ribbons as filled rectangles.'
  alt: "Forecast line with a confidence ribbon, with the legend showing a stroke glyph for the line series and a filled rectangle glyph for the confidence band."

- slug: jitter
  section: geoms
  title: "Jittered scatter"
  description: '<a href="../reference/geoms/geom-jitter.qmd"><code>geom-jitter</code></a> spreads coincident points using <a href="../reference/positions/position-jitter.qmd"><code>position-jitter</code></a>.'
  alt: "Scatter of highway mpg per vehicle class with horizontal jitter spreading overlapping points so the cluster density per class reads."

- slug: jitterdodge
  section: geoms
  title: "Jitter within dodged groups"
  description: '<a href="../reference/positions/position-jitterdodge.qmd"><code>position-jitterdodge</code></a> dodges colour groups apart, then jitters within each.'
  alt: "Scatter of trial responses across four weeks with three dose arms shown side by side, each arm dodged off the week and jittered inside its column."
