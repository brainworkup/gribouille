    <rect x="12" y="58.5" width="48" height="2.5" fill="#D9A021" stroke="#2B2B2B" stroke-width="0.8" stroke-linejoin="round"/>
    <polygon points="3,57.25 8,56 8,58.5" fill="#2B2B2B" stroke="#2B2B2B" stroke-width="0.8" stroke-linejoin="round"/>
