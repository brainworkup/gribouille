# Project-wide filter chain. Order matters: examples-data must run first so
# `typst-render` and `modal` see the blocks it injects on the examples page.
filters:
  - assets/lua/examples-data.lua
  - typst-render
  - modal

extensions:
  typst-render:
    root: "../"
    preamble: "_typst-preamble.typ"
    background: auto
    foreground: auto
    width: auto
    height: auto
    margin: 0.5cm
  modal:
    size: lg
    scrollable: true
