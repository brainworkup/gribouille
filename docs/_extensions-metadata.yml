# Project-wide filter chain. Order matters: examples-data must run first so
# `typst-render` and `modal` see the blocks it injects on the examples page.
filters:
  - assets/lua/examples-data.lua
  - typst-render
  - modal
  - gitlink
  - code-window

extensions:
  typst-render:
    root: "../"
    preamble: "_typst-preamble.typ"
    style: "display: block; margin-inline: auto;"
    align: center
    background: auto
    foreground: auto
    width: auto
    height: auto
    margin: 2pt
  modal:
    size: lg
    scrollable: true
