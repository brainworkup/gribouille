name: Deploy Documentation

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "lib.typ"
      - "src/**"
      - "tools/typstdoc/**"
      - "typst.toml"
      - "CHANGELOG.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pages only accepts one deployment at a time; queue instead of cancel.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    # Skip the bump-version commit on main; the Release workflow deploys docs
    # itself via its `pages` job (workflow_call), so this push would double-deploy.
    if: >-
      ${{ github.event_name != 'push'
        || !startsWith(github.event.head_commit.message, 'ci: bump version to') }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      GH_TOKEN: ${{ github.token }}
      QUARTO_TYPST: typst

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read Typst version from typst.toml
        id: typst-version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^compiler[[:space:]]*=/ { print $2; exit }' typst.toml)
          [[ -n "$version" ]] || { echo "::error::compiler not found in typst.toml"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ${{ steps.typst-version.outputs.version }}

      - name: Set up Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Resolve latest release tag
        id: latest-tag
        shell: bash
        run: |
          LATEST_TAG=$(git tag -l --sort=-v:refname 'v[0-9]*' | head -n 1)
          echo "tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"
          if [ -z "${LATEST_TAG}" ]; then
            echo "No release tag found; release site will be skipped."
          else
            echo "Latest release tag: ${LATEST_TAG}"
          fi

      - name: Render release site at root
        if: ${{ steps.latest-tag.outputs.tag != '' }}
        shell: bash
        env:
          LATEST_TAG: ${{ steps.latest-tag.outputs.tag }}
        run: |
          git checkout "${LATEST_TAG}"
          VERSION="${LATEST_TAG}" quarto render docs --profile release

      - name: Return to latest default branch
        if: ${{ steps.latest-tag.outputs.tag != '' }}
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

      - name: Render dev site at /dev/
        if: ${{ steps.latest-tag.outputs.tag != '' }}
        shell: bash
        run: |
          printf 'VERSION=dev\n' > docs/_environment-dev
          quarto render docs --profile dev

      - name: Render dev site at root (no release tag)
        if: ${{ steps.latest-tag.outputs.tag == '' }}
        shell: bash
        run: |
          printf 'VERSION=dev\n' > docs/_environment-no-release
          quarto render docs --profile no-release

      - name: Prepare site for deployment
        shell: bash
        run: touch docs/_site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./docs/_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Summary
        shell: bash
        env:
          LATEST_TAG: ${{ steps.latest-tag.outputs.tag }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          {
            echo "## Documentation deploy"
            echo ""
            if [ -n "${LATEST_TAG}" ]; then
              echo "- Root site source: \`${LATEST_TAG}\` (release)"
              echo "- Dev site source: \`main\`"
              echo "- Root URL: ${PAGE_URL}"
              echo "- Dev URL: ${PAGE_URL}dev/"
            else
              echo "- Root site source: \`main\` (no release tag yet)"
              echo "- Root URL: ${PAGE_URL}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
