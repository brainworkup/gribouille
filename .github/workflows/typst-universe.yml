name: Typst Universe Submission

on:
  workflow_call:
    inputs:
      version:
        description: "Release version to submit (e.g. 0.1.0). Blank uses the newest v* tag."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to submit (e.g. 0.1.0). Blank uses the newest v* tag."
        type: string
        required: false
        default: ""
      dry_run:
        description: "Push the branch to the fork but skip opening the PR against typst/packages."
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  submit:
    name: Submit to Typst Universe
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORK: ${{ vars.TYPST_PACKAGES_FORK }}

    steps:
      - name: Resolve token scope
        id: scope
        shell: bash
        run: echo "repos=${GITHUB_REPOSITORY##*/},${FORK##*/}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.scope.outputs.repos }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Git user
        id: git-user
        uses: ./.github/actions/setup-git-user
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure gh to back git operations
        env:
          GH_TOKEN: ${{ steps.git-user.outputs.token }}
        shell: bash
        run: gh auth setup-git

      - name: Resolve package version
        id: resolve-version
        env:
          VERSION_INPUT: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          if [ -n "${VERSION_INPUT}" ]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION=$(git tag -l --sort=-v:refname '[0-9]*' | head -n1)
            [ -n "${VERSION}" ] || { echo "::error::No release tag found."; exit 1; }
          fi
          BRANCH="gribouille-${VERSION}"
          [ "${DRY_RUN}" = "true" ] && BRANCH="dry-run-${BRANCH}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "ref=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release ref
        shell: bash
        env:
          REF: ${{ steps.resolve-version.outputs.ref }}
        run: |
          git fetch --tags --force
          git checkout "${REF}"

      - name: Stage package payload
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
        shell: bash
        run: tools/package.sh stage "/tmp/stage/gribouille/${VERSION}"

      - name: Clone fork of typst/packages
        env:
          GH_TOKEN: ${{ steps.git-user.outputs.token }}
          BRANCH: ${{ steps.resolve-version.outputs.branch }}
        shell: bash
        run: |
          if [ -z "${FORK}" ]; then
            echo "::error::Repository variable TYPST_PACKAGES_FORK is not set."
            exit 1
          fi
          gh repo clone "${FORK}" typst-packages -- --depth 50
          cd typst-packages
          git remote get-url upstream >/dev/null 2>&1 \
            || git remote add upstream https://github.com/typst/packages.git
          gh repo sync "${FORK}" --branch main \
            || echo "::warning::Fork main not synced (upstream workflow changes need the workflow permission); basing branch on the fork's current main."
          git fetch upstream main --depth 1
          git fetch origin main --depth 1
          git checkout -B "${BRANCH}" origin/main

      - name: Copy payload into packages/preview
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
        shell: bash
        run: |
          DEST="typst-packages/packages/preview/gribouille/${VERSION}"
          if [ -d "${DEST}" ]; then
            echo "::error::${DEST} already present upstream (already published)."
            exit 1
          fi
          mkdir -p "$(dirname "${DEST}")"
          cp -r "/tmp/stage/gribouille/${VERSION}" "${DEST}"

      - name: Commit and push to fork
        env:
          GH_TOKEN: ${{ steps.git-user.outputs.token }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          BRANCH: ${{ steps.resolve-version.outputs.branch }}
        shell: bash
        working-directory: typst-packages
        run: |
          git add "packages/preview/gribouille/${VERSION}"
          git commit -m "Add gribouille:${VERSION}"
          git push --force origin "${BRANCH}"

      - name: Open PR against typst/packages
        id: open-pr
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.git-user.outputs.token }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          BRANCH: ${{ steps.resolve-version.outputs.branch }}
        shell: bash
        working-directory: typst-packages
        run: |
          FORK_OWNER="${FORK%%/*}"

          PR_URL=$(gh pr list \
            --repo typst/packages \
            --head "${FORK_OWNER}:${BRANCH}" \
            --state open \
            --json url --jq '.[0].url // empty')

          if [ -n "${PR_URL}" ]; then
            echo "Reusing existing PR: ${PR_URL}"
          else
            if git ls-tree upstream/main:packages/preview/gribouille >/dev/null 2>&1; then
              NEW_BOX="[ ]"; UPDATE_BOX="[x]"; IS_UPDATE=1
            else
              NEW_BOX="[x]"; UPDATE_BOX="[ ]"; IS_UPDATE=0
            fi

            BODY_FILE="$(mktemp)"
            {
              printf 'I am submitting\n- %s a new package\n- %s an update for a package\n\n' "${NEW_BOX}" "${UPDATE_BOX}"
              printf 'Description: gribouille — create elegant graphics with the Grammar of Graphics for Typst, inspired by ggplot2 and plotnine. Declarative API: aesthetic mappings, geoms, stats, scales, coordinates, facets, themes.\n\n'
              printf -- '- Upstream repository: https://github.com/mcanouil/gribouille\n'
              printf -- '- Release: https://github.com/mcanouil/gribouille/releases/tag/%s\n' "${VERSION}"
              printf -- '- Homepage: https://m.canouil.dev/gribouille\n'

              if [ "${IS_UPDATE}" -eq 0 ]; then
                printf '\nI have read and followed the submission guidelines and, in particular, I\n'
                printf -- '- [x] selected a name that isn'\''t the most obvious or canonical name for what the package does\n'
                printf -- '- [x] added a `typst.toml` file with all required keys\n'
                printf -- '- [x] added a `README.md` with documentation for my package\n'
                printf -- '- [x] have chosen a license and added a `LICENSE` file or linked one in my `README.md`\n'
                printf -- '- [x] tested my package locally on my system and it worked\n'
                printf -- '- [x] excluded PDFs or README images, if any, but not the LICENSE\n'
              fi
            } > "${BODY_FILE}"

            PR_URL=$(gh pr create \
              --repo typst/packages \
              --base main \
              --head "${FORK_OWNER}:${BRANCH}" \
              --title "gribouille:${VERSION}" \
              --body-file "${BODY_FILE}")
          fi
          echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Summary
        shell: bash
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
          BRANCH: ${{ steps.resolve-version.outputs.branch }}
          PR_URL: ${{ steps.open-pr.outputs.pr_url }}
        run: |
          {
            echo "## Typst Universe submission"
            echo ""
            echo "- Package: \`gribouille:${VERSION}\`"
            echo "- Fork branch: \`${FORK}:${BRANCH}\`"
            echo "- PR: ${PR_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
