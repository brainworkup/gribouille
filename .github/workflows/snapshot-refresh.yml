name: Refresh visual snapshots

on:
  workflow_dispatch:
    inputs:
      direct:
        description: "Commit goldens straight to the dispatched branch (bypasses PR + auto-merge). Requires the App to bypass branch protection."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: snapshot-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Recompile and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      BRANCH: ci/snapshot-refresh
      COMMIT: "chore(tests): refresh visual snapshots"

    steps:
      # Mint the App token first so checkout can use it; that way every
      # subsequent `git push` authenticates as the App and the
      # `mcanouil-dev` bypass on branch protection applies. No need for
      # per-push extraheader overrides.
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Git user
        uses: ./.github/actions/setup-git-user
        with:
          token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read Typst version from typst.toml
        id: typst-version
        uses: ./.github/actions/typst-version

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ${{ steps.typst-version.outputs.version }}

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Regenerate goldens
        uses: ./.github/actions/typst-snapshot
        with:
          mode: update

      - name: Detect golden changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git add -N tests/visual/golden
          if git diff --quiet -- tests/visual/golden; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No golden changes." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Compute target branch
        if: ${{ steps.changes.outputs.changed == 'true' }}
        id: target
        env:
          DIRECT: ${{ inputs.direct }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${DIRECT}" == "true" ]]; then
            echo "branch=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit goldens via API
        if: ${{ steps.changes.outputs.changed == 'true' }}
        id: commit
        uses: ./.github/actions/commit-via-api
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ steps.target.outputs.branch }}
          base-branch: ${{ github.ref_name }}
          message: ${{ env.COMMIT }}

      - name: Open and auto-merge PR
        if: ${{ steps.changes.outputs.changed == 'true' && inputs.direct != true }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          sleep 5
          PR_URL=$(gh pr create \
            --fill-first \
            --base "${GITHUB_REF_NAME}" \
            --head "${BRANCH}" \
            --label "Type: CI/CD :robot:")
          sleep 5
          gh pr merge --auto --squash --delete-branch "${BRANCH}"
          {
            echo "## Visual snapshots refreshed"
            echo ""
            echo "- PR: ${PR_URL}"
            echo "- Commit: ${{ steps.commit.outputs.commit-url }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Direct-push summary
        if: ${{ steps.changes.outputs.changed == 'true' && inputs.direct == true }}
        shell: bash
        run: |
          {
            echo "## Visual snapshots refreshed (direct push)"
            echo ""
            echo "- Commit: ${{ steps.commit.outputs.commit-url }}"
          } >> "${GITHUB_STEP_SUMMARY}"
