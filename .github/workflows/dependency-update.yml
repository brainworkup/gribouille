name: Update Typst dependencies

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deps-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Check and bump Typst + cetz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      BRANCH: ci/bump-typst-deps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git user
        id: setup-git
        uses: ./.github/actions/setup-git-user
        with:
          gh-app-id: ${{ vars.APP_ID }}
          app-key: ${{ secrets.APP_KEY }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current pinned versions
        id: current
        shell: bash
        run: |
          set -euo pipefail
          typst=$(awk -F'"' '/^compiler[[:space:]]*=/ { print $2; exit }' typst.toml)
          [[ -n "$typst" ]] || { echo "::error::compiler not found in typst.toml"; exit 1; }
          cetz=$(grep -oE '@preview/cetz:[0-9][0-9A-Za-z.+-]*' src/deps.typ | head -n1 | cut -d: -f2)
          [[ -n "$cetz" ]] || { echo "::error::@preview/cetz pin not found in src/deps.typ"; exit 1; }
          {
            echo "typst=${typst}"
            echo "cetz=${cetz}"
          } >> "${GITHUB_OUTPUT}"

      - name: Fetch latest upstream versions
        id: latest
        env:
          GH_TOKEN: ${{ steps.setup-git.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          typst_tag=$(gh api repos/typst/typst/releases/latest --jq '.tag_name')
          cetz_tag=$(gh api repos/cetz-package/cetz/releases/latest --jq '.tag_name')
          typst="${typst_tag#v}"
          cetz="${cetz_tag#v}"
          [[ -n "$typst" ]] || { echo "::error::empty tag from typst/typst"; exit 1; }
          [[ -n "$cetz" ]] || { echo "::error::empty tag from cetz-package/cetz"; exit 1; }
          {
            echo "typst=${typst}"
            echo "cetz=${cetz}"
            echo "typst_tag=${typst_tag}"
            echo "cetz_tag=${cetz_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Decide whether a bump is needed
        id: diff
        env:
          CURRENT_TYPST: ${{ steps.current.outputs.typst }}
          CURRENT_CETZ: ${{ steps.current.outputs.cetz }}
          LATEST_TYPST: ${{ steps.latest.outputs.typst }}
          LATEST_CETZ: ${{ steps.latest.outputs.cetz }}
        shell: bash
        run: |
          set -euo pipefail
          typst_changed=false
          cetz_changed=false
          [[ "$CURRENT_TYPST" != "$LATEST_TYPST" ]] && typst_changed=true
          [[ "$CURRENT_CETZ" != "$LATEST_CETZ" ]] && cetz_changed=true
          any=false
          { [[ "$typst_changed" == "true" ]] || [[ "$cetz_changed" == "true" ]]; } && any=true
          {
            echo "typst_changed=${typst_changed}"
            echo "cetz_changed=${cetz_changed}"
            echo "any=${any}"
          } >> "${GITHUB_OUTPUT}"

      - name: No-op summary
        if: ${{ steps.diff.outputs.any != 'true' }}
        env:
          CURRENT_TYPST: ${{ steps.current.outputs.typst }}
          CURRENT_CETZ: ${{ steps.current.outputs.cetz }}
        shell: bash
        run: |
          {
            echo "## Typst dependency check"
            echo ""
            echo "No updates. Already on \`typst ${CURRENT_TYPST}\` and \`cetz ${CURRENT_CETZ}\`."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Apply bumps
        if: ${{ steps.diff.outputs.any == 'true' }}
        env:
          LATEST_TYPST: ${{ steps.latest.outputs.typst }}
          LATEST_CETZ: ${{ steps.latest.outputs.cetz }}
        shell: bash
        run: |
          set -euo pipefail
          sed -E -i 's/^(compiler[[:space:]]*=[[:space:]]*")[^"]+/\1'"${LATEST_TYPST}"'/' typst.toml
          sed -E -i 's|(@preview/cetz:)[0-9][0-9A-Za-z.+-]*|\1'"${LATEST_CETZ}"'|' src/deps.typ
          git --no-pager diff -- typst.toml src/deps.typ

      - name: Create branch, commit, push
        if: ${{ steps.diff.outputs.any == 'true' }}
        id: push
        env:
          GH_TOKEN: ${{ steps.setup-git.outputs.token }}
          CURRENT_TYPST: ${{ steps.current.outputs.typst }}
          CURRENT_CETZ: ${{ steps.current.outputs.cetz }}
          LATEST_TYPST: ${{ steps.latest.outputs.typst }}
          LATEST_CETZ: ${{ steps.latest.outputs.cetz }}
          TYPST_CHANGED: ${{ steps.diff.outputs.typst_changed }}
          CETZ_CHANGED: ${{ steps.diff.outputs.cetz_changed }}
        shell: bash
        run: |
          set -euo pipefail
          if git show-ref --quiet "refs/heads/${BRANCH}"; then
            git branch -D "${BRANCH}"
          fi
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            git push origin --delete "${BRANCH}"
          fi
          git checkout -b "${BRANCH}"

          git add typst.toml src/deps.typ

          if [[ "$TYPST_CHANGED" == "true" && "$CETZ_CHANGED" == "true" ]]; then
            SUBJECT="ci: bump typst to ${LATEST_TYPST}, cetz to ${LATEST_CETZ}"
          elif [[ "$TYPST_CHANGED" == "true" ]]; then
            SUBJECT="ci: bump typst to ${LATEST_TYPST}"
          else
            SUBJECT="ci: bump cetz to ${LATEST_CETZ}"
          fi

          git commit -m "${SUBJECT}"
          git push --force origin "${BRANCH}"

          {
            echo "subject=${SUBJECT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Open pull request
        if: ${{ steps.diff.outputs.any == 'true' }}
        id: pr
        env:
          GH_TOKEN: ${{ steps.setup-git.outputs.token }}
          SUBJECT: ${{ steps.push.outputs.subject }}
          CURRENT_TYPST: ${{ steps.current.outputs.typst }}
          CURRENT_CETZ: ${{ steps.current.outputs.cetz }}
          LATEST_TYPST: ${{ steps.latest.outputs.typst }}
          LATEST_CETZ: ${{ steps.latest.outputs.cetz }}
          LATEST_TYPST_TAG: ${{ steps.latest.outputs.typst_tag }}
          LATEST_CETZ_TAG: ${{ steps.latest.outputs.cetz_tag }}
          TYPST_CHANGED: ${{ steps.diff.outputs.typst_changed }}
          CETZ_CHANGED: ${{ steps.diff.outputs.cetz_changed }}
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="$(mktemp)"
          {
            echo "Automated bump of Typst toolchain dependencies."
            echo ""
            if [[ "$TYPST_CHANGED" == "true" ]]; then
              printf -- '- typst %s → %s (https://github.com/typst/typst/releases/tag/%s)\n' \
                "$CURRENT_TYPST" "$LATEST_TYPST" "$LATEST_TYPST_TAG"
            fi
            if [[ "$CETZ_CHANGED" == "true" ]]; then
              printf -- '- cetz %s → %s (https://github.com/cetz-package/cetz/releases/tag/%s)\n' \
                "$CURRENT_CETZ" "$LATEST_CETZ" "$LATEST_CETZ_TAG"
            fi
          } > "${BODY_FILE}"

          PR_URL=$(gh pr create \
            --title "${SUBJECT}" \
            --body-file "${BODY_FILE}" \
            --base "${GITHUB_REF_NAME}" \
            --head "${BRANCH}" \
            --label "Type: Dependencies :arrow_up:")
          echo "url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Summary
        if: ${{ steps.diff.outputs.any == 'true' }}
        env:
          CURRENT_TYPST: ${{ steps.current.outputs.typst }}
          CURRENT_CETZ: ${{ steps.current.outputs.cetz }}
          LATEST_TYPST: ${{ steps.latest.outputs.typst }}
          LATEST_CETZ: ${{ steps.latest.outputs.cetz }}
          LATEST_TYPST_TAG: ${{ steps.latest.outputs.typst_tag }}
          LATEST_CETZ_TAG: ${{ steps.latest.outputs.cetz_tag }}
          TYPST_CHANGED: ${{ steps.diff.outputs.typst_changed }}
          CETZ_CHANGED: ${{ steps.diff.outputs.cetz_changed }}
          PR_URL: ${{ steps.pr.outputs.url }}
        shell: bash
        run: |
          {
            echo "## Typst dependency bump"
            echo ""
            echo "| Dependency | From | To | Release |"
            echo "| ---------- | ---- | -- | ------- |"
            if [[ "$TYPST_CHANGED" == "true" ]]; then
              echo "| typst | \`${CURRENT_TYPST}\` | \`${LATEST_TYPST}\` | https://github.com/typst/typst/releases/tag/${LATEST_TYPST_TAG} |"
            fi
            if [[ "$CETZ_CHANGED" == "true" ]]; then
              echo "| cetz | \`${CURRENT_CETZ}\` | \`${LATEST_CETZ}\` | https://github.com/cetz-package/cetz/releases/tag/${LATEST_CETZ_TAG} |"
            fi
            echo ""
            echo "- PR: ${PR_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
