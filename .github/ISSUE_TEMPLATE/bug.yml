name: Bug report
description: Report an error or unexpected behaviour in Gribouille.
labels:
  - "Type: Bug :bug:"

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        > [!IMPORTANT]
        > This form is for **bug reports only**.
        > Feature requests belong in [Discussions → Ideas](https://github.com/mcanouil/gribouille/discussions/new?category=ideas).
        > Usage questions belong in [Discussions → Q&A](https://github.com/mcanouil/gribouille/discussions/new?category=q-a).

  - type: checkboxes
    attributes:
      label: Before submitting
      description: Please confirm each item before opening this issue.
      options:
        - label: I have searched the [issue tracker](https://github.com/mcanouil/gribouille/issues?q=is%3Aissue) and could not find a similar report.
          required: true
        - label: I have updated to the latest released version of Gribouille and reproduced the bug on that version.
          required: true
        - label: I confirm this is a bug report, not a feature request or a question.
          required: true

  - type: input
    attributes:
      label: Gribouille version
      description: Version of Gribouille used to reproduce the bug.
      placeholder: "e.g., 0.0.1"
    validations:
      required: true

  - type: input
    attributes:
      label: Typst compiler version
      description: Output of `typst --version`.
      placeholder: "e.g., 0.14.2"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Installation source
      description: How Gribouille was installed in the failing setup.
      options:
        - Typst Universe (`@preview`)
        - Local package directory
        - Git clone / source checkout
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Bug description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Minimal reproducible example
      description: |
        Paste a self-contained Typst document that reproduces the bug.
        Import Gribouille via `#import "@preview/gribouille:<version>": *` and keep the example as small as possible.
      render: typst
      placeholder: |
        #import "@preview/gribouille:0.0.1": *

        // Minimal example that reproduces the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reproduce the bug from a clean state.
      placeholder: |
        1. Compile the example above with `typst compile bug.typ`.
        2. Observe the error.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual behaviour
      description: |
        What actually happened.
        Paste any error output or stack trace verbatim inside a fenced code block.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Your environment
      description: IDE / editor and operating system used to reproduce the bug.
      placeholder: |
        - Editor: VS Code 1.95 | Positron | NeoVim | Typst.app
        - OS: macOS 14.5 | Windows 11 | Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: |
        Screenshots, related issues, or anything else that may help.
        For accessibility, please add alt text to every screenshot (`![alt text describing the image](url)`) and avoid relying on colour alone to convey meaning.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "_Thanks for submitting this bug report._"
