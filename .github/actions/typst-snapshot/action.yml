name: Compile + diff visual snapshots
description: Run the snapshot harness in --check or --update mode and surface diff artefacts.

inputs:
  mode:
    description: "Either 'check' (default, gates CI) or 'update' (rewrites goldens)."
    required: false
    default: "check"
  jobs:
    description: "Parallel typst compiles passed as --jobs (default: 4 to match ubuntu-latest vCPUs)."
    required: false
    default: "4"

runs:
  using: composite
  steps:
    - name: Install ImageMagick
      shell: bash
      # The harness compiles with --ignore-system-fonts, so only Typst's
      # embedded fonts are used; no system font packages are needed here.
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          imagemagick

    - name: Run snapshot harness
      id: snapshot
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        JOBS: ${{ inputs.jobs }}
      run: |
        set -euo pipefail
        log="${RUNNER_TEMP}/snapshot.log"
        case "${MODE}" in
          check)  lua tools/snapshot/run.lua --check --jobs "${JOBS}" 2>&1 | tee "${log}" ;;
          update) lua tools/snapshot/run.lua --update --jobs "${JOBS}" 2>&1 | tee "${log}" ;;
          *) echo "::error::unknown snapshot mode: ${MODE}"; exit 2 ;;
        esac

    - name: Upload diffs on failure
      if: failure() && inputs.mode == 'check'
      uses: actions/upload-artifact@v4
      with:
        name: visual-snapshot-diffs
        path: |
          build/snapshot/diff/
          build/snapshot/png/
        if-no-files-found: ignore
        retention-days: 14
