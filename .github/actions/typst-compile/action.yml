name: Compile Typst sources
description: Compile every Typst file in a directory and report pass/fail counts.

inputs:
  label:
    description: "Human label shown in the summary (e.g., 'unit', 'example')."
    required: true
  glob:
    description: "Glob pattern for files to compile (e.g., 'tests/unit/*.typ')."
    required: true
  root:
    description: "Typst project root passed with --root."
    required: false
    default: "."

outputs:
  passed:
    description: "Number of files that compiled successfully."
    value: ${{ steps.compile.outputs.passed }}
  total:
    description: "Total number of files considered."
    value: ${{ steps.compile.outputs.total }}
  failed:
    description: "Number of files that failed to compile."
    value: ${{ steps.compile.outputs.failed }}
  failures:
    description: "Newline-joined paths of files that failed to compile."
    value: ${{ steps.compile.outputs.failures }}

runs:
  using: composite
  steps:
    - id: compile
      shell: bash
      env:
        GLOB: ${{ inputs.glob }}
        ROOT: ${{ inputs.root }}
      run: |
        set -euo pipefail
        shopt -s nullglob
        FAILED_COUNT=0
        PASSED=0
        TOTAL=0
        FAILURES=()
        for f in ${GLOB}; do
          TOTAL=$((TOTAL + 1))
          echo "::group::Compile ${f}"
          if typst compile "${f}" --root "${ROOT}" "/tmp/$(basename "${f%.typ}").pdf"; then
            PASSED=$((PASSED + 1))
          else
            echo "::error file=${f}::Typst compilation failed"
            FAILED_COUNT=$((FAILED_COUNT + 1))
            FAILURES+=("${f}")
          fi
          echo "::endgroup::"
        done
        {
          echo "passed=${PASSED}"
          echo "total=${TOTAL}"
          echo "failed=${FAILED_COUNT}"
          echo "failures<<EOF"
          for path in "${FAILURES[@]}"; do echo "${path}"; done
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
        if [[ ${FAILED_COUNT} -gt 0 ]]; then exit 1; fi
