name: Commit via Git Data API
description: |
  Build a server-signed (Verified) commit on a target branch by uploading
  blobs, building a tree, creating a commit, and updating the ref via the
  GitHub Git Data API. Produces commits signed by GitHub on behalf of the
  App that owns the supplied token.

inputs:
  token:
    description: "App token used for the Git Data API calls. Must have `contents: write` on the target repo."
    required: true
  repo:
    description: "Target repo in `owner/name` form."
    required: false
    default: ${{ github.repository }}
  branch:
    description: "Target ref name (without the `refs/heads/` prefix), e.g. `ci/snapshot-refresh` or `main`."
    required: true
  base-branch:
    description: "Ref to start from when `branch` does not yet exist. Defaults to `branch` for in-place updates."
    required: false
    default: ""
  message:
    description: "Commit message."
    required: true
  paths:
    description: |
      Newline-separated list of paths (relative to `workdir`) to include in the commit.
      When empty, the action runs `git status --porcelain` in `workdir` and uses every
      A/M/D entry it finds.
    required: false
    default: ""
  workdir:
    description: "Working directory to read file contents and run `git status` in."
    required: false
    default: ${{ github.workspace }}

outputs:
  commit-sha:
    description: "SHA of the new commit (empty when there were no changes)."
    value: ${{ steps.commit.outputs.sha }}
  commit-url:
    description: "HTML URL of the new commit."
    value: ${{ steps.commit.outputs.url }}
  changed:
    description: "`true` when a new commit was pushed, `false` otherwise."
    value: ${{ steps.commit.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Create signed commit
      id: commit
      uses: actions/github-script@v7
      env:
        REPO: ${{ inputs.repo }}
        BRANCH: ${{ inputs.branch }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        MESSAGE: ${{ inputs.message }}
        PATHS_INPUT: ${{ inputs.paths }}
        WORKDIR: ${{ inputs.workdir }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs');
          const path = require('path');
          const child_process = require('child_process');

          const [owner, repo] = process.env.REPO.split('/');
          const branch = process.env.BRANCH;
          const baseBranch = process.env.BASE_BRANCH || branch;
          const message = process.env.MESSAGE;
          const workdir = process.env.WORKDIR;

          const parseStatus = () => {
            const out = child_process.execSync('git status --porcelain --untracked-files=all', {
              cwd: workdir,
              encoding: 'utf8',
            });
            const entries = [];
            for (const line of out.split('\n')) {
              if (!line.trim()) continue;
              // Porcelain format: XY <space> path  (rename: XY <space> from -> to)
              const status = line.slice(0, 2);
              let p = line.slice(3);
              if (p.includes(' -> ')) p = p.split(' -> ')[1];
              // Strip optional quotes around paths with special chars.
              if (p.startsWith('"') && p.endsWith('"')) p = p.slice(1, -1);
              const deleted = status[0] === 'D' || status[1] === 'D';
              entries.push({ path: p, deleted });
            }
            return entries;
          };

          const fromInput = () => process.env.PATHS_INPUT
            .split('\n')
            .map(s => s.trim())
            .filter(Boolean)
            .map(p => ({
              path: p,
              deleted: !fs.existsSync(path.join(workdir, p)),
            }));

          const entries = process.env.PATHS_INPUT.trim() ? fromInput() : parseStatus();
          if (entries.length === 0) {
            core.info('No changes detected; skipping commit.');
            core.setOutput('changed', 'false');
            core.setOutput('sha', '');
            core.setOutput('url', '');
            return;
          }

          // Resolve the parent commit. Prefer the existing target branch
          // (force-update); fall back to base-branch when the target ref
          // does not yet exist.
          const headRef = async (name) => {
            try {
              const { data } = await github.rest.git.getRef({ owner, repo, ref: `heads/${name}` });
              return data.object.sha;
            } catch (e) {
              if (e.status === 404) return null;
              throw e;
            }
          };

          let parentSha = await headRef(branch);
          let createRef = false;
          if (!parentSha) {
            parentSha = await headRef(baseBranch);
            createRef = true;
            if (!parentSha) {
              core.setFailed(`Neither refs/heads/${branch} nor refs/heads/${baseBranch} exist.`);
              return;
            }
          }
          const { data: parentCommit } = await github.rest.git.getCommit({
            owner, repo, commit_sha: parentSha,
          });

          const tree = [];
          for (const entry of entries) {
            const full = path.join(workdir, entry.path);
            if (entry.deleted) {
              tree.push({ path: entry.path, mode: '100644', type: 'blob', sha: null });
              core.info(`D  ${entry.path}`);
              continue;
            }
            const stat = fs.statSync(full);
            const mode = (stat.mode & 0o111) ? '100755' : '100644';
            const buf = fs.readFileSync(full);
            const { data: blob } = await github.rest.git.createBlob({
              owner, repo,
              content: buf.toString('base64'),
              encoding: 'base64',
            });
            tree.push({ path: entry.path, mode, type: 'blob', sha: blob.sha });
            core.info(`A/M ${entry.path}`);
          }

          const { data: newTree } = await github.rest.git.createTree({
            owner, repo,
            base_tree: parentCommit.tree.sha,
            tree,
          });

          if (newTree.sha === parentCommit.tree.sha) {
            core.info('Tree unchanged after staging; nothing to commit.');
            core.setOutput('changed', 'false');
            core.setOutput('sha', '');
            core.setOutput('url', '');
            return;
          }

          const { data: commit } = await github.rest.git.createCommit({
            owner, repo,
            message,
            tree: newTree.sha,
            parents: [parentSha],
          });

          if (createRef) {
            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/heads/${branch}`,
              sha: commit.sha,
            });
          } else {
            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${branch}`,
              sha: commit.sha,
              force: true,
            });
          }

          core.setOutput('changed', 'true');
          core.setOutput('sha', commit.sha);
          core.setOutput('url', `https://github.com/${owner}/${repo}/commit/${commit.sha}`);
          core.info(`Committed ${commit.sha} to ${owner}/${repo}@${branch}`);
