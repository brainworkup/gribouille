name: Read pinned Typst version
description: Extract the compiler version from typst.toml.

outputs:
  version:
    description: "Typst compiler version (no leading v)."
    value: ${{ steps.read.outputs.version }}

runs:
  using: composite
  steps:
    - id: read
      shell: bash
      run: |
        set -euo pipefail
        version=$(awk -F'"' '/^compiler[[:space:]]*=/ { print $2; exit }' typst.toml)
        [[ -n "$version" ]] || { echo "::error::compiler not found in typst.toml"; exit 1; }
        echo "version=$version" >> "$GITHUB_OUTPUT"
