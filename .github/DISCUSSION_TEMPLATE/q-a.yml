title: "Your question in one sentence"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening a discussion.
        Please check existing [Discussions](https://github.com/mcanouil/gribouille/discussions) first and comment on the relevant thread if your question is already covered.

  - type: textarea
    attributes:
      label: Description
      description: Describe what you are trying to achieve and where you are stuck.
      placeholder: |
        Include the Gribouille version and Typst compiler version you are using.
        Provide a minimal reproducible Typst example that shows the problem, for instance:

        ```typst
        #import "@preview/gribouille:0.0.1": *

        // Minimal example illustrating the question.
        ```
    validations:
      required: true
