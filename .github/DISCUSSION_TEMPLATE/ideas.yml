title: "The (missing) feature you want to discuss"
labels:
  - "Type: Enhancement :bulb:"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for Gribouille.
        Please describe the problem you are trying to solve and the behaviour you would like to see.

  - type: checkboxes
    attributes:
      label: Before posting
      options:
        - label: I have searched existing [Discussions](https://github.com/mcanouil/gribouille/discussions) and this idea has not already been proposed.
          required: true

  - type: textarea
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation that motivates this idea.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution or desired behaviour
      description: Describe what you would like Gribouille to do, ideally with a small Typst sketch.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
      description: Other approaches you have tried or considered, and why they fall short.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        If you attach screenshots or mockups, please add alt text (`![alt text describing the image](url)`) and avoid relying on colour alone to convey meaning.
